<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KAKUICHI FES AR</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#000; overflow:hidden; width:100vw; height:100vh; font-family:'Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif; }
#container { position:relative; width:100vw; height:100vh; }
#video {
  position:absolute; top:0; left:0;
  width:100%; height:100%; object-fit:cover;
  transform:scaleX(-1); z-index:1;
}
#bg-canvas       { position:absolute; top:0; left:0; width:100%; height:100%; z-index:0; }
#decoration-canvas { position:absolute; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:3; }
#canvas-overlay  { position:absolute; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:4; }
.speech-bubble {
  position:absolute; display:none;
  background:#fff; border:4px solid #FF1493;
  border-radius:20px; padding:10px 18px;
  font-size:clamp(12px,3vw,22px); font-weight:900; color:#FF1493;
  white-space:nowrap; pointer-events:none; z-index:20;
  box-shadow:0 4px 0 #FF1493,4px 0 0 #FF1493,-4px 0 0 #FF1493,0 -4px 0 #FF1493,6px 6px 0 rgba(0,0,0,0.3);
}
.speech-bubble::after {
  content:\'\'; position:absolute;
  top:50%; left:-18px; transform:translateY(-50%);
  border:10px solid transparent; border-right-color:#fff; z-index:2;
}
.speech-bubble::before {
  content:\'\'; position:absolute;
  top:50%; left:-26px; transform:translateY(-50%);
  border:13px solid transparent; border-right-color:#FF1493; z-index:1;
}
@keyframes bubblePop {
  0%  { transform:scale(0.4); opacity:0; }
  70% { transform:scale(1.1); }
  100%{ transform:scale(1);   opacity:1; }
}
#subtitle-bar {
  position:absolute; bottom:0; left:0; right:0;
  padding:16px 0 28px;
  background:linear-gradient(transparent,rgba(0,0,0,0.55));
  display:flex; justify-content:center; align-items:center; z-index:30;
}
.subtitle-text .char {
  display:inline-block;
  animation:charBounce 1.2s ease-in-out infinite;
  font-size:clamp(22px,6vw,52px); font-weight:900; letter-spacing:0.1em;
}
@keyframes charBounce {
  0%,100%{ transform:translateY(0) rotate(0deg); }
  25%    { transform:translateY(-7px) rotate(-4deg); }
  75%    { transform:translateY(-3px) rotate(4deg); }
}
#status {
  position:absolute; top:20px; left:50%; transform:translateX(-50%);
  background:rgba(0,0,0,0.6); color:#fff;
  padding:8px 20px; border-radius:20px; font-size:14px; z-index:40;
}
#start-btn {
  position:absolute; top:50%; left:50%;
  transform:translate(-50%,-50%);
  background:linear-gradient(135deg,#FF1493,#FF6B00);
  color:#fff; border:none; padding:20px 48px;
  font-size:22px; font-weight:900; border-radius:50px; cursor:pointer; z-index:50;
  letter-spacing:0.05em; box-shadow:0 8px 24px rgba(255,20,147,0.5);
  animation:btnPulse 2s ease-in-out infinite;
}
@keyframes btnPulse {
  0%,100%{ box-shadow:0 8px 24px rgba(255,20,147,0.5); }
  50%    { box-shadow:0 8px 40px rgba(255,107,0,0.8); }
}
/* ---- 操作ボタンバー ---- */
#controls {
  position:absolute;
  bottom:90px; left:50%;
  transform:translateX(-50%);
  display:none;
  gap:20px;
  z-index:50;
  align-items:center;
}
.ctrl-btn {
  width:64px; height:64px;
  border-radius:50%;
  border:3px solid rgba(255,255,255,0.85);
  background:rgba(0,0,0,0.45);
  color:#fff;
  font-size:28px;
  cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  backdrop-filter:blur(8px);
  -webkit-backdrop-filter:blur(8px);
  transition:transform 0.12s, background 0.12s;
  -webkit-tap-highlight-color:transparent;
  user-select:none;
}
.ctrl-btn:active { transform:scale(0.85); background:rgba(255,20,147,0.55); }
.ctrl-btn.shoot {
  width:76px; height:76px; font-size:32px;
  border:4px solid #fff;
  background:rgba(255,255,255,0.18);
}
#flash {
  position:absolute; inset:0;
  background:#fff;
  opacity:0; pointer-events:none;
  z-index:60;
  transition:opacity 0.06s;
}
#save-toast {
  position:absolute;
  top:70px; left:50%;
  transform:translateX(-50%);
  background:rgba(0,0,0,0.78);
  color:#fff; padding:10px 24px;
  border-radius:22px; font-size:15px; font-weight:700;
  z-index:55; display:none;
  white-space:nowrap;
}
</style>
</head>
<body>
<div id="container">
  <canvas id="bg-canvas"></canvas>
  <video id="video" autoplay muted playsinline></video>
  <canvas id="decoration-canvas"></canvas>
  <canvas id="canvas-overlay"></canvas>
  <div id="subtitle-bar"><div class="subtitle-text" id="subtitle"></div></div>
  <div id="flash"></div>
  <div id="save-toast">📸 保存しました！</div>
  <div id="status">📸 カメラを起動してください</div>
  <button id="start-btn" onclick="startAR()">🎪 ARスタート！</button>
  <div id="controls">
    <button class="ctrl-btn" onclick="switchCamera()" title="カメラ切替">🔄</button>
    <button class="ctrl-btn shoot" onclick="takeScreenshot()" title="スクリーンショット">📸</button>
  </div>
</div>

// Image layout analysis (measured from the PNG):
// The PNG is ~1080x1148px.
// The fur ring center is roughly at (50%, 68%) of the image.
// The ring inner hole spans roughly 38% of image width.
// The ears extend above the ring — total image height goes ~55% above ring center.
// We anchor by matching the ring hole to the face oval.
//
// Tuning constants (normalized to image size):
// RING_CENTER_X: 0.50  (horizontal center of the fur ring)
// RING_CENTER_Y: 0.68  (vertical center of the fur ring within image)
// RING_RADIUS_X: 0.22  (half-width of ring hole / image width)
// These let us scale & position the image so the hole matches the face.

const IMG_RING_CX = 0.50;   // ring center X (normalized to img width)
const IMG_RING_CY = 0.72;   // ring center Y (normalized to img height) — ears are above center
const IMG_RING_RX = 0.23;   // ring hole half-width (normalized to img width)

function drawDancer(ctx,d,W,H){
  const fi=Math.floor(d.frameAcc)%8,pose=POSES[fi];
  const cx=d.x*W,cy=d.baseY*H,sc=d.scale*Math.min(W,H);
  ctx.save();ctx.translate(cx,cy);if(d.flip)ctx.scale(-1,1);
  ctx.save();ctx.scale(1,.18);ctx.beginPath();ctx.ellipse(0,sc*.9,sc*.28,sc*.12,0,0,Math.PI*2);ctx.fillStyle='rgba(0,0,0,0.25)';ctx.fill();ctx.restore();
  const lH=pose[8],rH=pose[9],lA=pose[12],rA=pose[13];
  ctx.beginPath();ctx.moveTo(lH[0]*sc,lH[1]*sc);ctx.lineTo(rH[0]*sc,rH[1]*sc);ctx.lineTo((rA[0]+.1)*sc,(rA[1]-.08)*sc);ctx.lineTo((lA[0]-.1)*sc,(lA[1]-.08)*sc);ctx.closePath();ctx.fillStyle=d.col.skirt;ctx.fill();
  for(let r=0;r<3;r++){const t=.3+r*.25;const ly=(lH[1]+(lA[1]-lH[1])*t)*sc,ry=(rH[1]+(rA[1]-rH[1])*t)*sc;const lx=(lH[0]+(lA[0]-lH[0])*t-.08)*sc,rx=(rH[0]+(rA[0]-rH[0])*t+.08)*sc;ctx.beginPath();ctx.moveTo(lx,ly);ctx.bezierCurveTo(lx-sc*.06,ly-sc*.04,rx+sc*.06,ry-sc*.04,rx,ry);ctx.strokeStyle=d.col.acc;ctx.lineWidth=Math.max(1.5,sc*.025);ctx.stroke();}
  ctx.lineCap='round';
  BONES.forEach(([a,b])=>{const pa=pose[a],pb=pose[b];ctx.beginPath();ctx.moveTo(pa[0]*sc,pa[1]*sc);ctx.lineTo(pb[0]*sc,pb[1]*sc);ctx.strokeStyle=d.col.body;ctx.lineWidth=Math.max(2,sc*.06);ctx.stroke();});
  const hd=pose[0],hr=sc*.13;
  ctx.beginPath();ctx.arc(hd[0]*sc,hd[1]*sc,hr,0,Math.PI*2);ctx.fillStyle=d.col.head;ctx.fill();ctx.strokeStyle=d.col.body;ctx.lineWidth=Math.max(1.5,sc*.03);ctx.stroke();
  ctx.save();ctx.translate(hd[0]*sc,(hd[1]-.18)*sc);
  for(let f=-2;f<=2;f++){ctx.save();ctx.rotate(f*.28);ctx.beginPath();ctx.ellipse(0,-hr*1.5,hr*.28,hr*1.1,0,0,Math.PI*2);ctx.fillStyle=PARTY_COLORS[(Math.abs(f)+Math.floor(d.frameAcc))%PARTY_COLORS.length]+'CC';ctx.fill();ctx.restore();}
  ctx.beginPath();ctx.arc(0,-hr*.4,hr*.22,0,Math.PI*2);ctx.fillStyle=d.col.acc;ctx.fill();ctx.restore();
  const ex=hd[0]*sc,ey=hd[1]*sc;ctx.fillStyle='#222';
  ctx.beginPath();ctx.arc(ex-hr*.3,ey-hr*.15,hr*.1,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(ex+hr*.3,ey-hr*.15,hr*.1,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(ex,ey+hr*.1,hr*.28,.1,Math.PI-.1);ctx.strokeStyle='#222';ctx.lineWidth=Math.max(1,hr*.15);ctx.stroke();
  ctx.restore();
}

const particles=[];

function drawStar(ctx,size,color){ctx.fillStyle=color;ctx.beginPath();for(let i=0;i<10;i++){const r=i%2===0?size:size*.42,a=(i*Math.PI)/5-Math.PI/2;i===0?ctx.moveTo(Math.cos(a)*r,Math.sin(a)*r):ctx.lineTo(Math.cos(a)*r,Math.sin(a)*r);}ctx.closePath();ctx.fill();}

let globalFrame=0,bgStars=null;
function animate(){
  globalFrame++;
  const W=window.innerWidth,H=window.innerHeight;
  bgCtx.clearRect(0,0,W,H);
  const grad=bgCtx.createLinearGradient(0,0,0,H);
  grad.addColorStop(0,'#1a0533');grad.addColorStop(.5,'#3d0a6e');grad.addColorStop(1,'#0a0a0a');
  bgCtx.fillStyle=grad;bgCtx.fillRect(0,0,W,H);
  if(!bgStars)bgStars=Array.from({length:60},()=>({x:Math.random(),y:Math.random()*.5,r:Math.random()*1.5+.4,a:Math.random()}));
  bgStars.forEach(s=>{const tw=(Math.sin(globalFrame*.03+s.a*10)*.5+.5)*.8+.2;bgCtx.beginPath();bgCtx.arc(s.x*W,s.y*H,s.r,0,Math.PI*2);bgCtx.fillStyle=`rgba(255,255,255,${tw*.8})`;bgCtx.fill();});
  bgCtx.fillStyle='#1a0a2e';bgCtx.fillRect(0,H*.78,W,H*.22);
  const sg=bgCtx.createLinearGradient(0,H*.78,0,H);
  sg.addColorStop(0,'rgba(255,20,147,0.3)');sg.addColorStop(1,'rgba(255,107,0,0.1)');
  bgCtx.fillStyle=sg;bgCtx.fillRect(0,H*.78,W,H*.22);
  [.15,.35,.65,.85].forEach((bx,bi)=>{
    const hue=[320,200,45,270][bi],spread=.12+Math.sin(globalFrame*.02+bi)*.05;
    const grd=bgCtx.createRadialGradient(bx*W,0,0,bx*W,H*.85,H*.9);
    grd.addColorStop(0,`hsla(${hue},100%,70%,0.18)`);grd.addColorStop(1,'transparent');
    bgCtx.beginPath();bgCtx.moveTo(bx*W,0);bgCtx.lineTo((bx-spread)*W,H*.85);bgCtx.lineTo((bx+spread)*W,H*.85);bgCtx.closePath();bgCtx.fillStyle=grd;bgCtx.fill();
  });
  dancers.forEach(d=>{d.frameAcc+=d.speed;drawDancer(bgCtx,d,W,H);});
  decoCtx.clearRect(0,0,W,H);
  for(let g=0;g<3;g++){
    decoCtx.strokeStyle=PARTY_COLORS[g*2];decoCtx.lineWidth=2.5;decoCtx.beginPath();
    const segs=14;
    for(let s=0;s<=segs;s++){const px=(s/segs)*W,py=28+g*26+Math.sin((s/segs)*Math.PI*5+globalFrame*.04+g)*10;s===0?decoCtx.moveTo(px,py):decoCtx.lineTo(px,py);}
    decoCtx.stroke();
    for(let s=1;s<=segs;s+=2){const px=(s/segs)*W,py=28+g*26+Math.sin((s/segs)*Math.PI*5+globalFrame*.04+g)*10;decoCtx.fillStyle=PARTY_COLORS[(s+g)%PARTY_COLORS.length];decoCtx.beginPath();decoCtx.moveTo(px-9,py);decoCtx.lineTo(px+9,py);decoCtx.lineTo(px,py+16);decoCtx.closePath();decoCtx.fill();}
  }
  if(globalFrame%3===0&&particles.length<100)particles.push(spawnParticle());
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];p.x+=p.vx;p.y+=p.vy;p.rot+=p.rotV;p.vy+=.05;
    if(p.y>H+20){particles.splice(i,1);continue;}
    decoCtx.save();decoCtx.translate(p.x,p.y);decoCtx.rotate(p.rot*Math.PI/180);
    if(p.shape==='rect'){decoCtx.fillStyle=p.color;decoCtx.fillRect(-p.size/2,-p.size/4,p.size,p.size/2);}
    else if(p.shape==='circle'){decoCtx.beginPath();decoCtx.arc(0,0,p.size/2,0,Math.PI*2);decoCtx.fillStyle=p.color;decoCtx.fill();}
    else if(p.shape==='triangle'){decoCtx.fillStyle=p.color;decoCtx.beginPath();decoCtx.moveTo(0,-p.size/2);decoCtx.lineTo(p.size/2,p.size/2);decoCtx.lineTo(-p.size/2,p.size/2);decoCtx.closePath();decoCtx.fill();}
    else drawStar(decoCtx,p.size/2,p.color);
    decoCtx.restore();
  }
  requestAnimationFrame(animate);
}
animate();

// =============================================
//  BUNNY IMAGE OVERLAY
//  顔の楕円にリングの穴を合わせて描画
// =============================================
function drawBunnyOverlay(ctx, lm, W, H) {
  if (!BUNNY_IMG.complete || !BUNNY_IMG.naturalWidth) return;

  const pt = i => ({ x: (1 - lm[i].x) * W, y: lm[i].y * H });

  const leftCheek  = pt(234);
  const rightCheek = pt(454);
  const forehead   = pt(10);
  const chin       = pt(152);
  const leftTemp   = pt(127);
  const rightTemp  = pt(356);

  const faceCx = (leftCheek.x + rightCheek.x) / 2;
  const faceCy = (forehead.y  + chin.y)        / 2;
  const faceRx = Math.hypot(rightCheek.x - leftCheek.x, rightCheek.y - leftCheek.y) / 2;
  const faceRy = Math.hypot(chin.x - forehead.x, chin.y - forehead.y) / 2;
  const faceAngle = Math.atan2(rightTemp.y - leftTemp.y, rightTemp.x - leftTemp.x);

  const imgW = (faceRx * 1.18) / IMG_RING_RX;
  const imgH = imgW * (BUNNY_IMG.naturalHeight / BUNNY_IMG.naturalWidth);

  // オフスクリーンで「うさぎ画像 - 顔楕円穴」を合成してから描画
  const pad = 20;
  const ofc = document.createElement('canvas');
  // 回転した画像全体が収まるサイズ
  const diagonal = Math.ceil(Math.hypot(imgW, imgH)) + pad * 2;
  ofc.width  = diagonal;
  ofc.height = diagonal;
  const oCtx = ofc.getContext('2d');
  const cx = diagonal / 2;
  const cy = diagonal / 2;

  // (1) うさぎ画像を描画（上下反転を補正: scaleY(-1)）
  oCtx.save();
  oCtx.translate(cx, cy);
  oCtx.scale(1, -1);   // 上下反転を補正
  oCtx.translate(-cx, -cy);
  oCtx.drawImage(BUNNY_IMG,
    cx - IMG_RING_CX * imgW,
    cy - IMG_RING_CY * imgH,
    imgW, imgH);
  oCtx.restore();

  // (2) 顔楕円をdestination-outで透明に（顔が見えるように穴を開ける）
  oCtx.globalCompositeOperation = 'destination-out';
  oCtx.beginPath();
  oCtx.ellipse(cx, cy, faceRx * 1.05, faceRy * 1.1, 0, 0, Math.PI * 2);
  oCtx.fill();
  oCtx.globalCompositeOperation = 'source-over';

  // (3) 本canvasに顔の傾き角で回転して転写
  ctx.save();
  ctx.translate(faceCx, faceCy);
  ctx.rotate(faceAngle);
  ctx.drawImage(ofc, -cx, -cy);
  ctx.restore();
}

// =============================================
//  SPEECH BUBBLES
// =============================================
const MAX_FACES = 4;
const faceStates = Array.from({length:MAX_FACES}, ()=>({mouthOpen:false, cooldown:0, bubbleEl:null}));
faceStates.forEach((fs,i)=>{
  const el = document.createElement('div');
  el.className = 'speech-bubble';
  el.textContent = '🎉 KAKUICHI FES 行きてー！';
  document.getElementById('container').appendChild(el);
  fs.bubbleEl = el;
});

// =============================================
//  FACE MESH
// =============================================
const video    = document.getElementById('video');
const statusEl = document.getElementById('status');
const flashEl  = document.getElementById('flash');
const toastEl  = document.getElementById('save-toast');

let currentFacing = 'user';   // 'user' = フロント, 'environment' = バック
let currentStream = null;
let faceMeshInstance = null;
let cameraInstance = null;

async function startAR(){
  document.getElementById('start-btn').style.display='none';
  statusEl.textContent='📷 カメラ起動中...';
  await startCamera(currentFacing);
}

async function startCamera(facing){
  // 既存ストリームを停止
  if(currentStream){ currentStream.getTracks().forEach(t=>t.stop()); }
  if(cameraInstance){ try{ cameraInstance.stop(); }catch(e){} }

  try{
    currentFacing = facing;
    const stream = await navigator.mediaDevices.getUserMedia({
      video:{ facingMode: facing, width:{ideal:1280}, height:{ideal:720} }
    });
    currentStream = stream;
    video.srcObject = stream;
    video.onloadedmetadata = () => {
      overlayCanvas.width  = video.videoWidth;
      overlayCanvas.height = video.videoHeight;
      if(!faceMeshInstance) initFaceMesh();
      else restartCamera();
    };
    // ビデオのCSS mirror: フロントはミラー、バックはそのまま
    video.style.transform = facing === 'user' ? 'scaleX(-1)' : 'scaleX(1)';
    document.getElementById('controls').style.display = 'flex';
  }catch(e){
    statusEl.textContent='⚠ カメラへのアクセスが必要です';
    console.error(e);
  }
}

async function switchCamera(){
  const newFacing = currentFacing === 'user' ? 'environment' : 'user';
  statusEl.textContent = '🔄 カメラ切替中...';
  await startCamera(newFacing);
}

function restartCamera(){
  if(cameraInstance){ try{ cameraInstance.stop(); }catch(e){} }
  cameraInstance = new Camera(video, {
    onFrame: async()=>{ if(faceMeshInstance) await faceMeshInstance.send({image:video}); },
    width:1280, height:720
  });
  cameraInstance.start();
  statusEl.textContent='🐰 口を開けてみて！';
}

function initFaceMesh(){
  statusEl.textContent='🔍 モデル読み込み中...';
  faceMeshInstance = new FaceMesh({locateFile:f=>`https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${f}`});
  faceMeshInstance.setOptions({maxNumFaces:MAX_FACES, refineLandmarks:true, minDetectionConfidence:0.5, minTrackingConfidence:0.5});
  faceMeshInstance.onResults(onResults);
  cameraInstance = new Camera(video, {
    onFrame: async()=>{ await faceMeshInstance.send({image:video}); },
    width:1280, height:720
  });
  cameraInstance.start();
  statusEl.textContent='🐰 口を開けてみて！';
}

// ---- スクリーンショット ----
function takeScreenshot(){
  // 閃光エフェクト
  flashEl.style.opacity='1';
  setTimeout(()=>{ flashEl.style.opacity='0'; }, 80);

  // 全レイヤーを合成: bg + video + deco + overlay
  const W = window.innerWidth, H = window.innerHeight;
  const shot = document.createElement('canvas');
  shot.width = W; shot.height = H;
  const sCtx = shot.getContext('2d');

  // 1) 背景canvas
  sCtx.drawImage(bgCanvas, 0, 0, W, H);

  // 2) ビデオ（ミラー補正込み）
  sCtx.save();
  if(currentFacing === 'user'){
    sCtx.translate(W, 0);
    sCtx.scale(-1, 1);
  }
  sCtx.drawImage(video, 0, 0, W, H);
  sCtx.restore();

  // 3) デコcanvas（ガーランド・紙吹雪）
  sCtx.drawImage(decoCanvas, 0, 0, W, H);

  // 4) ARオーバーレイ（うさぎ）
  sCtx.drawImage(overlayCanvas, 0, 0, W, H);

  // 5) 字幕バーを画像として合成（subtitle-barをhtml2canvasなしで簡易再現）
  const subH = 90;
  const subGrad = sCtx.createLinearGradient(0, H-subH, 0, H);
  subGrad.addColorStop(0,'rgba(0,0,0,0)');
  subGrad.addColorStop(1,'rgba(0,0,0,0.55)');
  sCtx.fillStyle = subGrad;
  sCtx.fillRect(0, H-subH, W, subH);

  // 字幕テキスト
  const subColors=['#FF1493','#FF6B00','#FFD700','#00E5FF','#7B2FFF','#39FF14'];
  const subStr='KAKUICHI 白組';
  const fontSize = Math.min(52, W*0.06);
  sCtx.font = `900 ${fontSize}px 'Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif`;
  sCtx.textBaseline='middle';
  const totalW = subStr.split('').reduce((acc,ch)=>{ sCtx.font=`900 ${fontSize}px sans-serif`; return acc+sCtx.measureText(ch).width+fontSize*0.1; },0);
  let tx = (W - totalW) / 2;
  subStr.split('').forEach((ch,i)=>{
    const c = subColors[i%subColors.length];
    sCtx.fillStyle=c;
    sCtx.shadowColor=c; sCtx.shadowBlur=12;
    sCtx.fillText(ch, tx, H - subH/2);
    tx += sCtx.measureText(ch).width + fontSize*0.1;
  });
  sCtx.shadowBlur=0;

  // 6) ダウンロード / iPhoneは長押し保存を案内
  const isIOS = /iP(hone|ad|od)/.test(navigator.userAgent);
  if(isIOS){
    // iOSはa.download非対応 → 新タブで画像を開く（長押し→保存）
    shot.toBlob(blob=>{
      const url = URL.createObjectURL(blob);
      window.open(url, '_blank');
      showToast('🖼 画像を長押しして保存してください');
    }, 'image/png');
  } else {
    // Android / PC
    const link = document.createElement('a');
    link.download = 'kakuichi_fes_' + Date.now() + '.png';
    link.href = shot.toDataURL('image/png');
    link.click();
    showToast('📸 保存しました！');
  }
}

function showToast(msg){
  toastEl.textContent = msg;
  toastEl.style.display = 'block';
  clearTimeout(toastEl._t);
  toastEl._t = setTimeout(()=>{ toastEl.style.display='none'; }, 2500);
}

function onResults(results){
  const W = overlayCanvas.width  = video.videoWidth  || window.innerWidth;
  const H = overlayCanvas.height = video.videoHeight || window.innerHeight;
  overlayCtx.clearRect(0, 0, W, H);
  const detected = results.multiFaceLandmarks || [];

  for(let i=detected.length; i<MAX_FACES; i++){
    faceStates[i].bubbleEl.style.display='none';
    faceStates[i].mouthOpen=false; faceStates[i].cooldown=0;
  }

  detected.forEach((lm, fi)=>{
    const fs = faceStates[fi];
    const pt = i => ({ x:(1-lm[i].x)*W, y:lm[i].y*H });

    // うさぎ画像オーバーレイ
    drawBunnyOverlay(overlayCtx, lm, W, H);

    // 口開き検出
    const upperLip   = pt(13), lowerLip  = pt(14);
    const leftEye    = pt(159), rightEye = pt(386);
    const rightCheek = pt(454);
    const eyeDist    = Math.hypot(rightEye.x-leftEye.x, rightEye.y-leftEye.y);
    const bubbleX    = rightCheek.x + eyeDist * 0.6;
    const isOpen     = Math.abs(lowerLip.y - upperLip.y) / eyeDist > 0.22;

    if(isOpen && fs.cooldown<=0){
      if(!fs.mouthOpen){
        fs.mouthOpen = true;
        showBubble(fs.bubbleEl, bubbleX, upperLip.y, W, H);
        fs.cooldown = 40;
        statusEl.textContent = '🐰 KAKUICHI FES 行きてー！';
      }
    } else if(!isOpen){
      fs.mouthOpen = false;
      if(fs.cooldown<=0) fs.bubbleEl.style.display='none';
    }
    if(fs.cooldown>0) fs.cooldown--;
  });

  if(!detected.length){
    statusEl.textContent='😊 顔を向けてください';
    faceStates.forEach(fs=>fs.bubbleEl.style.display='none');
  }
}

function showBubble(el, faceRightX, faceTopY, W, H){
  const vw=window.innerWidth, vh=window.innerHeight;
  const bx = (faceRightX/W)*vw;
  const by = (faceTopY/H)*vh;
  el.style.display='block';
  el.style.left = Math.min(bx, vw-300)+'px';
  el.style.top  = Math.max(40, Math.min(by, vh-80))+'px';
  el.style.animation='none'; void el.offsetWidth; el.style.animation='bubblePop 0.3s ease-out';
}
