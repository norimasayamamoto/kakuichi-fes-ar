<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>KAKUICHI FES AR</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#fffff8;overflow:hidden;width:100vw;height:100vh;font-family:'Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif;}
#container{position:relative;width:100vw;height:100vh;}
#bg-canvas{position:absolute;top:0;left:0;width:100%;height:100%;z-index:0;}
#video{position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover;transform:scaleX(-1);z-index:1;opacity:0;transition:opacity 0.5s;}
#deco-canvas{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:3;}
#ar-canvas{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:4;}
#subtitle-bar{position:absolute;bottom:0;left:0;right:0;padding:14px 0 22px;background:linear-gradient(transparent,rgba(255,240,200,0.85));display:flex;justify-content:center;align-items:center;z-index:30;}
.sub-char{display:inline-block;animation:cb 0.75s ease-in-out infinite;font-size:clamp(18px,5vw,44px);font-weight:900;letter-spacing:0.08em;}
@keyframes cb{0%,100%{transform:translateY(0) rotate(-2deg);}50%{transform:translateY(-7px) rotate(4deg) scale(1.1);}}
#start-btn{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:linear-gradient(135deg,#e74c3c,#e67e22);color:#fff;border:4px solid #fff;padding:18px 44px;font-size:21px;font-weight:900;border-radius:50px;cursor:pointer;z-index:50;box-shadow:0 6px 24px rgba(230,100,0,0.5);animation:bp 1s ease-in-out infinite;}
@keyframes bp{0%,100%{transform:translate(-50%,-50%) scale(1);}50%{transform:translate(-50%,-50%) scale(1.07);}}
#controls{position:absolute;bottom:82px;left:50%;transform:translateX(-50%);display:none;gap:14px;z-index:50;align-items:center;}
.ctrl-btn{width:60px;height:60px;border-radius:50%;border:3px solid #e74c3c;background:rgba(255,255,255,0.9);color:#c0392b;font-size:13px;font-weight:900;cursor:pointer;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);transition:transform 0.1s,background 0.15s;-webkit-tap-highlight-color:transparent;user-select:none;flex-direction:column;line-height:1.2;}
.ctrl-btn:active{transform:scale(0.82);}
.ctrl-btn.shoot{width:72px;height:72px;font-size:28px;border-width:4px;}
.ctrl-btn.audio{border-color:#e67e22;color:#e67e22;font-size:22px;}
#flash{position:absolute;inset:0;background:#fff;opacity:0;pointer-events:none;z-index:60;transition:opacity 0.06s;}
#toast{position:absolute;top:55px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.75);color:#fff;padding:9px 22px;border-radius:20px;font-size:14px;font-weight:700;z-index:55;display:none;white-space:nowrap;}
</style>
</head>
<body>
<div id="container">
  <canvas id="bg-canvas"></canvas>
  <video id="video" autoplay muted playsinline></video>
  <canvas id="deco-canvas"></canvas>
  <canvas id="ar-canvas"></canvas>
  <div id="subtitle-bar"><div id="subtitle"></div></div>
  <div id="flash"></div>
  <div id="toast"></div>
  <button id="start-btn" onclick="startAR()">🎭 ARスタート！</button>
  <div id="controls">
    <button class="ctrl-btn audio" id="audio-btn" onclick="toggleAudio()">🔊</button>
    <button class="ctrl-btn" id="cam-btn" onclick="switchCamera()">IN</button>
    <button class="ctrl-btn shoot" onclick="takeScreenshot()">&#x1F4F8;</button>
  </div>
</div>

// =============================================
//  MATSURI HAYASHI - Web Audio API
// =============================================
var audioCtx=null;
var audioStarted=false;
var masterGain=null;
var audioMuted=false;
var tempoMult=1.0;

function initAudio(){
  if(audioStarted) return;
  audioStarted=true;
  try{
    audioCtx=new (window.AudioContext||window.webkitAudioContext)();
    masterGain=audioCtx.createGain();
    masterGain.gain.value=0.0;
    masterGain.connect(audioCtx.destination);
    masterGain.gain.linearRampToValueAtTime(0.7,audioCtx.currentTime+1.5);
    startHayashi();
    updateAudioBtn();
  }catch(e){console.warn('AudioContext error:',e);}
}

function setAudioTempo(mult){tempoMult=mult;}

function updateAudioBtn(){
  var btn=document.getElementById('audio-btn');
  if(!btn) return;
  if(!audioStarted||audioMuted) btn.innerHTML='&#x1F507;';
  else btn.innerHTML='&#x1F50A;';
}

function toggleAudio(){
  if(!audioStarted){
    initAudio();
    audioMuted=false;
  } else {
    audioMuted=!audioMuted;
    if(masterGain){
      var t=audioCtx.currentTime;
      if(audioMuted) masterGain.gain.linearRampToValueAtTime(0,t+0.3);
      else masterGain.gain.linearRampToValueAtTime(0.7,t+0.3);
    }
  }
  updateAudioBtn();
}

// --- 音色生成ヘルパー ---
function makeOsc(type,freq,start,dur,vol,dest){
  var o=audioCtx.createOscillator(),g=audioCtx.createGain();
  o.type=type;o.frequency.value=freq;
  g.gain.setValueAtTime(0,start);g.gain.linearRampToValueAtTime(vol,start+0.005);
  g.gain.exponentialRampToValueAtTime(0.001,start+dur);
  o.connect(g);g.connect(dest||masterGain);
  o.start(start);o.stop(start+dur+0.01);
}
function makeDrum(freq,start,dur,vol){
  var o=audioCtx.createOscillator(),g=audioCtx.createGain();
  o.type='sine';o.frequency.setValueAtTime(freq,start);
  o.frequency.exponentialRampToValueAtTime(freq*0.15,start+dur*0.5);
  g.gain.setValueAtTime(0,start);g.gain.linearRampToValueAtTime(vol,start+0.003);
  g.gain.exponentialRampToValueAtTime(0.001,start+dur);
  o.connect(g);g.connect(masterGain);o.start(start);o.stop(start+dur+0.01);
}
function makeNoise(start,dur,vol,freq,q){
  var bufSize=Math.floor(audioCtx.sampleRate*dur);
  var buf=audioCtx.createBuffer(1,bufSize,audioCtx.sampleRate);
  var data=buf.getChannelData(0);
  for(var i=0;i<bufSize;i++) data[i]=(Math.random()*2-1);
  var src=audioCtx.createBufferSource();
  src.buffer=buf;
  var flt=audioCtx.createBiquadFilter();
  flt.type='bandpass';flt.frequency.value=freq||3000;flt.Q.value=q||1.5;
  var g=audioCtx.createGain();
  g.gain.setValueAtTime(vol,start);g.gain.exponentialRampToValueAtTime(0.001,start+dur);
  src.connect(flt);flt.connect(g);g.connect(masterGain);
  src.start(start);src.stop(start+dur+0.01);
}
function makeFue(freq,start,dur,vol){
  var o=audioCtx.createOscillator(),o2=audioCtx.createOscillator();
  var g=audioCtx.createGain(),g2=audioCtx.createGain();
  o.type='sine';o.frequency.value=freq;
  o2.type='sine';o2.frequency.value=freq*2.01;g2.gain.value=0.3;
  var lfo=audioCtx.createOscillator(),lfoG=audioCtx.createGain();
  lfo.frequency.value=5.5;lfoG.gain.value=freq*0.015;
  lfo.connect(lfoG);lfoG.connect(o.frequency);
  g.gain.setValueAtTime(0,start);g.gain.linearRampToValueAtTime(vol,start+0.04);
  g.gain.setValueAtTime(vol,start+dur-0.06);g.gain.linearRampToValueAtTime(0,start+dur);
  o.connect(g);o2.connect(g2);g2.connect(g);g.connect(masterGain);
  lfo.start(start);lfo.stop(start+dur+0.01);
  o.start(start);o.stop(start+dur+0.01);
  o2.start(start);o2.stop(start+dur+0.01);
}
function makeShamisen(freq,start,vol){
  var o=audioCtx.createOscillator(),o2=audioCtx.createOscillator();
  var g=audioCtx.createGain(),g2=audioCtx.createGain();
  o.type='sawtooth';o.frequency.value=freq;
  o2.type='square';o2.frequency.value=freq*1.005;g2.gain.value=0.15;
  var dur=0.18;
  g.gain.setValueAtTime(0,start);g.gain.linearRampToValueAtTime(vol,start+0.006);
  g.gain.exponentialRampToValueAtTime(0.001,start+dur);
  o.connect(g);o2.connect(g2);g2.connect(g);g.connect(masterGain);
  o.start(start);o.stop(start+dur+0.01);
  o2.start(start);o2.stop(start+dur+0.01);
}
function makeTaiko(start,vol,big){
  makeDrum(big?80:130,start,big?0.5:0.25,vol);
  makeNoise(start,0.04,vol*0.3,200,0.8);
}
function makeHyoshigi(start,vol){
  makeNoise(start,0.08,vol,5000,8);
  makeOsc('square',1200,start,0.06,vol*0.3);
}

var seqTimer=null;
var BPM_BASE=200;
var KANE_FREQS=[440,330,440,330,440,330,440,330];
var FUE_SCALE=[330,392,440,494,587,659];
var FUE_MELODY=[
  {s:0,f:4,d:2},{s:3,f:5,d:1},{s:4,f:4,d:2},{s:6,f:3,d:2},
  {s:8,f:5,d:3},{s:12,f:4,d:2},{s:14,f:3,d:2},
  {s:16,f:3,d:2},{s:18,f:4,d:1},{s:19,f:5,d:1},{s:20,f:4,d:2},{s:22,f:5,d:2},
  {s:24,f:5,d:4},{s:28,f:4,d:2},{s:30,f:3,d:2}
];
var PHRASE_LEN=32;
var phraseStep=0;

function scheduleBar(barStart,bpm){
  var step=(60/bpm)*0.5;
  for(var i=0;i<8;i++){
    var t=barStart+i*step;
    var kVol=(i%2===0)?0.5:0.28;
    makeShamisen(KANE_FREQS[i],t,kVol);
    if(i===0) makeTaiko(t,0.7,true);
    else if(i===2) makeTaiko(t,0.45,false);
    else if(i===4) makeTaiko(t,0.55,true);
    else if(i===6) makeTaiko(t,0.38,false);
    else if(i===7) makeTaiko(t+step*0.5,0.38,false);
    if(i===0) makeHyoshigi(t,0.25);
    if(i===4) makeHyoshigi(t,0.2);
  }
  var localBar=Math.floor(phraseStep/8)%4;
  FUE_MELODY.forEach(function(n){
    if(Math.floor(n.s/8)===localBar){
      var t2=barStart+(n.s%8)*step;
      makeFue(FUE_SCALE[n.f],t2,n.d*step*0.85,0.3);
    }
  });
  phraseStep=(phraseStep+8)%PHRASE_LEN;
}

function startHayashi(){
  var nextBar=audioCtx.currentTime+0.1;
  function tick(){
    var bpm=BPM_BASE*Math.min(tempoMult*0.8+0.2,2.0);
    var barLen=(60/bpm)*0.5*8;
    while(nextBar<audioCtx.currentTime+barLen*2){
      scheduleBar(nextBar,bpm);
      nextBar+=barLen;
    }
    seqTimer=setTimeout(tick,100);
  }
  tick();
}

var bgC=document.getElementById('bg-canvas'),bgX=bgC.getContext('2d');
var dcC=document.getElementById('deco-canvas'),dcX=dcC.getContext('2d');
var arC=document.getElementById('ar-canvas'),arX=arC.getContext('2d');
function rsz(){[bgC,dcC,arC].forEach(function(c){c.width=window.innerWidth;c.height=window.innerHeight;});}
rsz();window.addEventListener('resize',rsz);

// ---- Global speed multiplier (mouth-open boost) ----
var speedMult=1.0;


// =============================================
//  HYOTTOKO CHARACTER
// =============================================
function drawHyChar(ctx,hh,W,H){
  var cx=hh.x*W,cy=hh.y*H,r=hh.sc*Math.min(W,H),ph=hh.ph;
  ctx.save();ctx.translate(cx,cy);if(hh.fl)ctx.scale(-1,1);ctx.rotate(Math.sin(ph)*.08);ctx.translate(Math.sin(ph)*r*.15,0);
  // shadow
  ctx.save();ctx.scale(1,.15);ctx.beginPath();ctx.ellipse(0,r*6.2,r*1.8,r*.7,0,0,Math.PI*2);ctx.fillStyle='rgba(0,0,0,0.1)';ctx.fill();ctx.restore();
  // body (kimono)
  ctx.beginPath();ctx.ellipse(0,r*3,r*1.6,r*2.8,0,0,Math.PI*2);ctx.fillStyle='#e74c3c';ctx.fill();ctx.strokeStyle='#c0392b';ctx.lineWidth=r*.1;ctx.stroke();
  ctx.save();ctx.beginPath();ctx.ellipse(0,r*3,r*1.6,r*2.8,0,0,Math.PI*2);ctx.clip();
  for(var s=-3;s<=3;s++){ctx.beginPath();ctx.moveTo(s*r*.5,-r);ctx.lineTo(s*r*.5,r*7);ctx.strokeStyle='rgba(255,255,255,0.2)';ctx.lineWidth=r*.18;ctx.stroke();}ctx.restore();
  // collar
  ctx.beginPath();ctx.moveTo(-r*.5,r*.5);ctx.lineTo(0,r*1.5);ctx.lineTo(r*.5,r*.5);ctx.strokeStyle='#fff';ctx.lineWidth=r*.18;ctx.stroke();
  // arms
  var aL=Math.sin(ph+.5)*r*1.2,aR=Math.sin(ph-.5)*r*1.2;
  ctx.strokeStyle='#e74c3c';ctx.lineWidth=r*.35;ctx.lineCap='round';
  ctx.beginPath();ctx.moveTo(-r*.9,r*1.8);ctx.lineTo(-r*1.8,r*1.8+aL);ctx.stroke();
  ctx.beginPath();ctx.moveTo(r*.9,r*1.8);ctx.lineTo(r*1.8,r*1.8+aR);ctx.stroke();
  ctx.fillStyle='#FFDAB9';
  ctx.beginPath();ctx.arc(-r*1.8,r*1.8+aL,r*.28,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(r*1.8,r*1.8+aR,r*.28,0,Math.PI*2);ctx.fill();
  // legs
  var lL=Math.abs(Math.sin(ph))*r*.5,lR=Math.abs(Math.sin(ph+Math.PI))*r*.5;
  ctx.strokeStyle='#c0392b';ctx.lineWidth=r*.4;
  ctx.beginPath();ctx.moveTo(-r*.5,r*5.5);ctx.lineTo(-r*.6,r*5.5+lL);ctx.stroke();
  ctx.beginPath();ctx.moveTo(r*.5,r*5.5);ctx.lineTo(r*.6,r*5.5+lR);ctx.stroke();
  ctx.fillStyle='#8B4513';
  ctx.beginPath();ctx.ellipse(-r*.6,r*5.5+lL,r*.4,r*.18,0,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(r*.6,r*5.5+lR,r*.4,r*.18,0,0,Math.PI*2);ctx.fill();
  // face
  var fb=Math.sin(ph*2)*r*.05;
  ctx.beginPath();ctx.arc(0,-r*.5+fb,r*1.05,0,Math.PI*2);ctx.fillStyle='#FFDAB9';ctx.fill();ctx.strokeStyle='#e0a080';ctx.lineWidth=r*.08;ctx.stroke();
  // big left eye
  ctx.beginPath();ctx.ellipse(-r*.35,-r*.6+fb,r*.28,r*.32,0,0,Math.PI*2);ctx.fillStyle='#fff';ctx.fill();ctx.strokeStyle='#333';ctx.lineWidth=r*.06;ctx.stroke();
  ctx.beginPath();ctx.arc(-r*.35,-r*.58+fb,r*.15,0,Math.PI*2);ctx.fillStyle='#1a1a1a';ctx.fill();
  ctx.beginPath();ctx.arc(-r*.28,-r*.66+fb,r*.06,0,Math.PI*2);ctx.fillStyle='#fff';ctx.fill();
  // squint right eye
  ctx.save();ctx.translate(r*.38,-r*.62+fb);ctx.beginPath();ctx.ellipse(0,0,r*.24,r*.1+Math.abs(Math.sin(ph))*.08,0,0,Math.PI*2);ctx.strokeStyle='#333';ctx.lineWidth=r*.08;ctx.stroke();ctx.restore();
  // hyottoko mouth (puckered)
  ctx.save();ctx.translate(r*.18,-r*.18+fb);ctx.beginPath();ctx.ellipse(0,0,r*.32,r*.24,-.3,0,Math.PI*2);ctx.fillStyle='#e74c3c';ctx.fill();ctx.strokeStyle='#c0392b';ctx.lineWidth=r*.05;ctx.stroke();ctx.fillStyle='#fff';ctx.fillRect(-r*.15,r*.02,r*.28,r*.12);ctx.restore();
  // cheeks
  ctx.beginPath();ctx.arc(-r*.5,-r*.4+fb,r*.2,0,Math.PI*2);ctx.fillStyle='rgba(255,100,100,0.3)';ctx.fill();
  ctx.beginPath();ctx.arc(r*.6,-r*.35+fb,r*.18,0,Math.PI*2);ctx.fillStyle='rgba(255,100,100,0.3)';ctx.fill();
  // hachimaki
  ctx.save();ctx.translate(0,-r*.95+fb);
  var hg=ctx.createLinearGradient(0,-r*.22,0,r*.13);hg.addColorStop(0,'#fff');hg.addColorStop(1,'#eee');
  ctx.beginPath();ctx.rect(-r*1.05,-r*.22,r*2.1,r*.35);ctx.fillStyle=hg;ctx.fill();
  ctx.fillStyle='#e74c3c';ctx.fillRect(-r*1.05,-r*.22,r*2.1,r*.07);ctx.fillRect(-r*1.05,r*.06,r*2.1,r*.07);
  ctx.beginPath();ctx.arc(0,-r*.04,r*.12,0,Math.PI*2);ctx.fillStyle='#e74c3c';ctx.fill();ctx.restore();
  // topknot
  ctx.beginPath();ctx.ellipse(0,-r*1.4+fb,r*.25,r*.45,0,0,Math.PI*2);ctx.fillStyle='#1a1a1a';ctx.fill();
  ctx.restore();
}

function drawAwaDancer(ctx,d,W,H){
  var cx=d.x*W, cy=d.y*H, r=d.sc*Math.min(W,H), ph=d.ph;
  ctx.save();
  ctx.translate(cx,cy);
  if(d.fl)ctx.scale(-1,1);

  // ---- 阿波踊りポーズ ----
  // 体は前傾気味、腕は高く上げる
  var lean=Math.sin(ph)*0.18; // 体の傾き
  ctx.rotate(lean);

  // 影
  ctx.save();ctx.scale(1,0.15);
  ctx.beginPath();ctx.ellipse(0,r*7,r*1.4,r*0.6,0,0,Math.PI*2);
  ctx.fillStyle='rgba(0,0,0,0.08)';ctx.fill();ctx.restore();

  // 着物（白装束）- 台形シルエット
  ctx.beginPath();
  ctx.moveTo(-r*0.7, r*1.0);
  ctx.lineTo( r*0.7, r*1.0);
  ctx.lineTo( r*1.1, r*5.5);
  ctx.lineTo(-r*1.1, r*5.5);
  ctx.closePath();
  ctx.fillStyle='rgba(255,255,255,0.92)';
  ctx.fill();
  ctx.strokeStyle='rgba(180,180,180,0.6)';ctx.lineWidth=r*0.06;ctx.stroke();

  // 着物の縦縞（薄い）
  ctx.save();
  ctx.clip();
  for(var s=-2;s<=2;s++){
    ctx.beginPath();ctx.moveTo(s*r*0.45,r);ctx.lineTo(s*r*0.55,r*6);
    ctx.strokeStyle='rgba(220,220,220,0.5)';ctx.lineWidth=r*0.12;ctx.stroke();
  }
  ctx.restore();

  // 帯（赤）
  ctx.beginPath();
  ctx.rect(-r*0.75, r*1.8, r*1.5, r*0.4);
  ctx.fillStyle='#e74c3c';ctx.fill();

  // 衿
  ctx.beginPath();
  ctx.moveTo(-r*0.3,r*0.9);ctx.lineTo(0,r*1.9);ctx.lineTo(r*0.3,r*0.9);
  ctx.strokeStyle='rgba(200,200,200,0.8)';ctx.lineWidth=r*0.12;ctx.stroke();

  // 腕（阿波踊りは腕を高く斜めに上げる）
  var armAngleL = -Math.PI*0.55 + Math.sin(ph)*0.3;
  var armAngleR = -Math.PI*0.35 + Math.sin(ph+Math.PI)*0.3;
  ctx.strokeStyle='rgba(255,255,255,0.9)';ctx.lineWidth=r*0.28;ctx.lineCap='round';
  // 左腕（上）
  ctx.beginPath();
  ctx.moveTo(-r*0.5, r*1.2);
  ctx.lineTo(-r*0.5+Math.cos(armAngleL)*r*1.8, r*1.2+Math.sin(armAngleL)*r*1.8);
  ctx.stroke();
  // 右腕（上）
  ctx.beginPath();
  ctx.moveTo(r*0.5, r*1.2);
  ctx.lineTo(r*0.5+Math.cos(armAngleR)*r*1.8, r*1.2+Math.sin(armAngleR)*r*1.8);
  ctx.stroke();
  // 手
  ctx.fillStyle='#FFDAB9';
  ctx.beginPath();ctx.arc(-r*0.5+Math.cos(armAngleL)*r*1.8, r*1.2+Math.sin(armAngleL)*r*1.8, r*0.2,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(r*0.5+Math.cos(armAngleR)*r*1.8, r*1.2+Math.sin(armAngleR)*r*1.8, r*0.2,0,Math.PI*2);ctx.fill();

  // 足（ぴょこぴょこ）
  var legSwing=Math.abs(Math.sin(ph));
  ctx.strokeStyle='rgba(255,255,255,0.88)';ctx.lineWidth=r*0.32;ctx.lineCap='round';
  ctx.beginPath();ctx.moveTo(-r*0.45,r*5.4);ctx.lineTo(-r*0.55,r*5.4+legSwing*r*0.7);ctx.stroke();
  ctx.beginPath();ctx.moveTo(r*0.45,r*5.4);ctx.lineTo(r*0.55,r*5.4+(1-legSwing)*r*0.7);ctx.stroke();
  // 草履（白）
  ctx.fillStyle='rgba(240,230,220,0.9)';
  ctx.beginPath();ctx.ellipse(-r*0.55,r*5.4+legSwing*r*0.7,r*0.32,r*0.14,0,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(r*0.55,r*5.4+(1-legSwing)*r*0.7,r*0.32,r*0.14,0,0,Math.PI*2);ctx.fill();

  // 顔
  var fb=Math.sin(ph*2)*r*0.04;
  ctx.beginPath();ctx.arc(0,-r*0.5+fb,r*0.85,0,Math.PI*2);
  ctx.fillStyle='#FFDAB9';ctx.fill();
  ctx.strokeStyle='rgba(200,160,120,0.4)';ctx.lineWidth=r*0.06;ctx.stroke();

  // 目
  ctx.fillStyle='#333';
  ctx.beginPath();ctx.ellipse(-r*0.28,-r*0.6+fb,r*0.1,r*0.07,0,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(r*0.28,-r*0.6+fb,r*0.1,r*0.07,0,0,Math.PI*2);ctx.fill();

  // 笑顔
  ctx.beginPath();ctx.arc(0,-r*0.42+fb,r*0.28,0.15,Math.PI-0.15);
  ctx.strokeStyle='#c0392b';ctx.lineWidth=r*0.08;ctx.stroke();

  // ほっぺ
  ctx.beginPath();ctx.arc(-r*0.42,-r*0.45+fb,r*0.18,0,Math.PI*2);
  ctx.fillStyle='rgba(255,100,100,0.25)';ctx.fill();
  ctx.beginPath();ctx.arc(r*0.42,-r*0.45+fb,r*0.18,0,Math.PI*2);
  ctx.fillStyle='rgba(255,100,100,0.25)';ctx.fill();

  // 笠（阿波踊りの三度笠）
  ctx.save();ctx.translate(0,-r*1.1+fb);
  // 笠のつば
  ctx.beginPath();ctx.ellipse(0,0,r*1.3,r*0.35,-0.05,0,Math.PI*2);
  ctx.fillStyle='rgba(245,235,210,0.95)';ctx.fill();
  ctx.strokeStyle='rgba(160,140,100,0.5)';ctx.lineWidth=r*0.05;ctx.stroke();
  // 笠の山
  ctx.beginPath();ctx.moveTo(-r*0.7,-r*0.05);ctx.quadraticCurveTo(0,-r*0.85,r*0.7,-r*0.05);
  ctx.fillStyle='rgba(245,235,210,0.95)';ctx.fill();ctx.stroke();
  // 笠のライン
  ctx.strokeStyle='rgba(160,140,100,0.3)';ctx.lineWidth=r*0.04;
  for(var k=-2;k<=2;k++){
    ctx.beginPath();ctx.moveTo(k*r*0.28,-r*0.05);ctx.quadraticCurveTo(k*r*0.22+r*0.02,-r*0.7,0,-r*0.82);ctx.stroke();
  }
  ctx.restore();

  ctx.restore();
}

// ---- 提灯 ----
var LCOL=['#e74c3c','#e67e22','#f1c40f','#e74c3c','#9b59b6','#27ae60','#e74c3c','#3498db'];
var lanterns=[];
for(var i=0;i<8;i++) lanterns.push({x:(i+0.5)/8,ph:Math.random()*Math.PI*2,spd:0.015,col:LCOL[i]});
function drawLantern(ctx,x,y,col,sw,sz){
  ctx.save();ctx.translate(x,y);ctx.rotate(Math.sin(sw)*0.1);
  ctx.strokeStyle='#8B4513';ctx.lineWidth=1.5;ctx.beginPath();ctx.moveTo(0,-sz*1.3);ctx.lineTo(0,0);ctx.stroke();
  var g=ctx.createRadialGradient(-sz*.4,-sz*.5,sz*.1,0,0,sz);
  g.addColorStop(0,'rgba(255,255,180,0.95)');g.addColorStop(0.5,col+'dd');g.addColorStop(1,col+'88');
  ctx.beginPath();ctx.ellipse(0,0,sz*.75,sz,0,0,Math.PI*2);ctx.fillStyle=g;ctx.fill();
  ctx.strokeStyle=col;ctx.lineWidth=1.5;ctx.stroke();
  ctx.save();ctx.fillStyle='rgba(255,255,255,0.9)';ctx.font='bold '+sz*.7+'px serif';
  ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('\u796d',0,0);ctx.restore();
  ctx.strokeStyle=col;ctx.lineWidth=2;ctx.lineCap='round';
  ctx.beginPath();ctx.moveTo(-sz*.2,sz);ctx.quadraticCurveTo(-sz*.5,sz*1.6,-sz*.3,sz*2.1);ctx.stroke();
  ctx.beginPath();ctx.moveTo(sz*.2,sz);ctx.quadraticCurveTo(sz*.5,sz*1.6,sz*.3,sz*2.1);ctx.stroke();
  ctx.restore();
}

// ---- 桜 ----
var petals=[];
for(var i=0;i<40;i++) petals.push({x:Math.random(),y:Math.random(),vx:(Math.random()-.5)*.0009,vy:.0006+Math.random()*.001,rot:Math.random()*360,rv:(Math.random()-.5)*2,sz:Math.random()*8+4,al:.4+Math.random()*.5});
function drawPetal(ctx,p,W,H){
  ctx.save();ctx.translate(p.x*W,p.y*H);ctx.rotate(p.rot*Math.PI/180);ctx.globalAlpha=p.al;ctx.fillStyle='#ffb7c5';
  for(var k=0;k<5;k++){ctx.save();ctx.rotate(k*Math.PI*2/5);ctx.beginPath();ctx.moveTo(0,0);ctx.bezierCurveTo(p.sz*.5,-p.sz*.5,p.sz,-p.sz*.2,0,-p.sz*1.1);ctx.bezierCurveTo(-p.sz,-p.sz*.2,-p.sz*.5,-p.sz*.5,0,0);ctx.fill();ctx.restore();}
  ctx.restore();
}

// ---- 花火 ----
var fws=[],fwT=0;
function spawnFw(W,H){
  var cols=['#e74c3c','#e67e22','#f1c40f','#ff69b4','#9b59b6','#00e5ff'];
  var cx=(.15+Math.random()*.7)*W,cy=(.04+Math.random()*.3)*H,col=cols[Math.floor(Math.random()*cols.length)];
  for(var i=0;i<30;i++){var a=Math.random()*Math.PI*2,sp=Math.random()*4+1.5;fws.push({x:cx,y:cy,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:1,col:col});}
}

var gf=0;
function animate(){
  gf++;
  var W=window.innerWidth,H=window.innerHeight;
  var sm=speedMult; // current speed multiplier

  // ---- BG ----
  bgX.clearRect(0,0,W,H);
  var bg=bgX.createLinearGradient(0,0,0,H);
  bg.addColorStop(0,'#fffff8');bg.addColorStop(0.6,'#fff8f0');bg.addColorStop(1,'#fff0e0');
  bgX.fillStyle=bg;bgX.fillRect(0,0,W,H);
  // 薄格子
  bgX.strokeStyle='rgba(200,180,150,0.15)';bgX.lineWidth=1;
  for(var x=0;x<W;x+=40){bgX.beginPath();bgX.moveTo(x,0);bgX.lineTo(x,H);bgX.stroke();}
  for(var y=0;y<H;y+=40){bgX.beginPath();bgX.moveTo(0,y);bgX.lineTo(W,y);bgX.stroke();}

  // ---- DECO canvas (z:3, video z:1 の上) ----
  // 踊り子・提灯・花火・桜をすべてdcXに描画→カメラ映像の上に常時表示
  dcX.clearRect(0,0,W,H);

  // 踊り子（奥→手前ソート）
  dancers.sort(function(a,b){return a.y-b.y;});
  dancers.forEach(function(d){
    d.ph += d.spd * sm;
    d.x += Math.sin(d.ph*0.7)*0.001*sm;
    if(d.x<-0.1)d.x=1.1;if(d.x>1.1)d.x=-0.1;
    if(d.type==='hyo') drawHyChar(dcX,d,W,H);
    else drawAwaDancer(dcX,d,W,H);
  });

  // 提灯
  var lsz=Math.min(W,H)*.036;
  lanterns.forEach(function(l){l.ph+=l.spd*sm;drawLantern(dcX,l.x*W,H*.11,l.col,l.ph,lsz);});
  dcX.strokeStyle='rgba(100,60,20,0.3)';dcX.lineWidth=1.5;dcX.beginPath();
  lanterns.forEach(function(l,i){i===0?dcX.moveTo(l.x*W,H*.11-lsz):dcX.lineTo(l.x*W,H*.11-lsz);});dcX.stroke();

  // 花火
  fwT++;if(fwT%(sm>1.5?35:75)===0)spawnFw(W,H);
  for(var i=fws.length-1;i>=0;i--){
    var fw=fws[i];fw.x+=fw.vx*sm;fw.y+=fw.vy*sm;fw.vy+=.06;fw.life-=.022*sm;
    if(fw.life<=0){fws.splice(i,1);continue;}
    dcX.save();dcX.globalAlpha=fw.life*.9;dcX.fillStyle=fw.col;dcX.beginPath();dcX.arc(fw.x,fw.y,2.8,0,Math.PI*2);dcX.fill();dcX.restore();
  }

  // 桜
  petals.forEach(function(p){
    p.x+=p.vx*sm;p.y+=p.vy*sm;p.rot+=p.rv*sm;
    if(p.y>1.05){p.y=-.05;p.x=Math.random();}
    drawPetal(dcX,p,W,H);
  });

  // speedMult をなめらかに戻す
  if(speedMult>1.0) speedMult=Math.max(1.0,speedMult-0.04);

  requestAnimationFrame(animate);
}
animate();

// =============================================
//  AR FACE DECORATION
// =============================================
function drawHachimaki(ctx,lm,W,H){
  var pt=function(i){return{x:(1-lm[i].x)*W,y:lm[i].y*H};};
  var fo=pt(10),ls=pt(234),rs=pt(454);
  var fw2=Math.hypot(rs.x-ls.x,rs.y-ls.y),u=fw2*.1,ang=Math.atan2(rs.y-ls.y,rs.x-ls.x);
  ctx.save();ctx.translate(fo.x,fo.y);ctx.rotate(ang);
  var bW=fw2*1.08,bH=u*1.2,bY=-u*.2;
  var hg=ctx.createLinearGradient(0,bY-bH/2,0,bY+bH/2);hg.addColorStop(0,'#fff');hg.addColorStop(1,'#eee');
  ctx.beginPath();ctx.rect(-bW/2,bY-bH/2,bW,bH);ctx.fillStyle=hg;ctx.fill();
  ctx.strokeStyle='rgba(0,0,0,0.08)';ctx.lineWidth=1;ctx.stroke();
  var lh=bH*.2;ctx.fillStyle='#e74c3c';
  ctx.fillRect(-bW/2,bY-bH/2,bW,lh);ctx.fillRect(-bW/2,bY+bH/2-lh,bW,lh);
  ctx.beginPath();ctx.arc(0,bY,u*.52,0,Math.PI*2);ctx.fillStyle='#e74c3c';ctx.fill();
  ctx.restore();
  // 結び目
  var kx=rs.x+u*.4,ky=rs.y;
  ctx.save();ctx.translate(kx,ky);ctx.rotate(ang+.25);
  ctx.beginPath();ctx.ellipse(-u*.35,-u*.55,u*.65,u*.3,-.3,0,Math.PI*2);ctx.fillStyle='#fff';ctx.fill();ctx.strokeStyle='#e74c3c';ctx.lineWidth=1.5;ctx.stroke();
  ctx.beginPath();ctx.ellipse(u*.2,u*.45,u*.55,u*.28,.4,0,Math.PI*2);ctx.fillStyle='#fff';ctx.fill();ctx.strokeStyle='#e74c3c';ctx.lineWidth=1.5;ctx.stroke();
  ctx.beginPath();ctx.ellipse(0,0,u*.28,u*.22,0,0,Math.PI*2);ctx.fillStyle='#e74c3c';ctx.fill();
  ctx.strokeStyle='#fff';ctx.lineWidth=bH*.7;ctx.lineCap='round';
  ctx.beginPath();ctx.moveTo(0,u*.2);ctx.lineTo(-u*.35,u*1.3);ctx.stroke();
  ctx.beginPath();ctx.moveTo(0,u*.2);ctx.lineTo(u*.28,u*1.5);ctx.stroke();
  ctx.restore();
}
function drawCheeks(ctx,lm,W,H){
  var pt=function(i){return{x:(1-lm[i].x)*W,y:lm[i].y*H};};
  var lc=pt(205),rc=pt(425),ls=pt(234),rs=pt(454);
  var fw2=Math.hypot(rs.x-ls.x,rs.y-ls.y),r=fw2*.13;
  [lc,rc].forEach(function(p){
    var g=ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,r);
    g.addColorStop(0,'rgba(255,80,80,0.45)');g.addColorStop(1,'rgba(255,80,80,0)');
    ctx.beginPath();ctx.arc(p.x,p.y,r,0,Math.PI*2);ctx.fillStyle=g;ctx.fill();
  });
}
function drawNose(ctx,lm,W,H){
  var pt=function(i){return{x:(1-lm[i].x)*W,y:lm[i].y*H};};
  var n=pt(1),ls=pt(234),rs=pt(454);
  var fw2=Math.hypot(rs.x-ls.x,rs.y-ls.y),r=fw2*.1;
  var g=ctx.createRadialGradient(n.x-r*.2,n.y-r*.2,r*.05,n.x,n.y,r);
  g.addColorStop(0,'rgba(255,160,100,0.65)');g.addColorStop(.6,'rgba(220,120,80,0.45)');g.addColorStop(1,'rgba(180,80,60,0)');
  ctx.beginPath();ctx.arc(n.x,n.y,r,0,Math.PI*2);ctx.fillStyle=g;ctx.fill();
  [-.28,.28].forEach(function(ox){
    ctx.beginPath();ctx.ellipse(n.x+ox*r,n.y+r*.25,r*.18,r*.13,0,0,Math.PI*2);
    ctx.fillStyle='rgba(100,50,30,0.3)';ctx.fill();
  });
}

// ---- 吹き出し（canvas描画・口の位置）----
function drawSpeechBubble(ctx,mx,my,W,H,anim,msgIdx){
  // サイズ
  var bw=Math.min(W*0.38,260);
  var bh=bw*0.52;
  // ポップアニメ
  var sc=1;
  if(anim<6) sc=0.4+(anim/6)*0.65;
  else if(anim<10) sc=1.05;

  // 吹き出しは口の右上に配置（顔に被らないよう）
  // 尻尾（三角）の先端を口元に合わせる
  var tailX=mx, tailY=my;
  // 本体は右上方向
  var bx=tailX+bw*0.08;  // 本体左端
  var by=tailY-bh-bh*0.22; // 本体上端

  ctx.save();
  // スケールアニメ（尻尾先端を中心に）
  ctx.translate(tailX,tailY);
  ctx.scale(sc,sc);
  ctx.translate(-tailX,-tailY);

  // 吹き出し本体
  var r2=bh*0.22;
  ctx.beginPath();
  ctx.moveTo(bx+r2,by);
  ctx.lineTo(bx+bw-r2,by);
  ctx.quadraticCurveTo(bx+bw,by,bx+bw,by+r2);
  ctx.lineTo(bx+bw,by+bh-r2);
  ctx.quadraticCurveTo(bx+bw,by+bh,bx+bw-r2,by+bh);
  ctx.lineTo(bx+r2,by+bh);
  ctx.quadraticCurveTo(bx,by+bh,bx,by+bh-r2);
  ctx.lineTo(bx,by+r2);
  ctx.quadraticCurveTo(bx,by,bx+r2,by);
  ctx.closePath();
  ctx.fillStyle='#fffff0';
  ctx.shadowColor='rgba(0,0,0,0.18)';ctx.shadowBlur=10;ctx.shadowOffsetY=3;
  ctx.fill();
  ctx.shadowBlur=0;ctx.shadowOffsetY=0;
  ctx.strokeStyle='#e74c3c';ctx.lineWidth=3;ctx.stroke();

  // 尻尾（三角）
  ctx.beginPath();
  ctx.moveTo(tailX,tailY);
  ctx.lineTo(bx+bw*0.12,by+bh);
  ctx.lineTo(bx+bw*0.32,by+bh);
  ctx.closePath();
  ctx.fillStyle='#fffff0';ctx.fill();
  ctx.strokeStyle='#e74c3c';ctx.lineWidth=3;
  ctx.beginPath();
  ctx.moveTo(tailX,tailY);
  ctx.lineTo(bx+bw*0.12,by+bh+1);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(tailX,tailY);
  ctx.lineTo(bx+bw*0.32,by+bh+1);
  ctx.stroke();

  // テキスト「白組優勝！」
  var fs=Math.min(bh*0.42,38);
  ctx.font='900 '+fs+'px sans-serif';
  ctx.textAlign='center';ctx.textBaseline='middle';
  var tx=bx+bw/2, ty=by+bh/2;
  // 影
  var _msg=(typeof BUBBLE_MSGS!=='undefined'?BUBBLE_MSGS[msgIdx||0]:null)||'白組優勝！';
  ctx.fillStyle='rgba(0,0,0,0.12)';ctx.fillText(_msg,tx+2,ty+2);
  // グラデ文字
  var tg=ctx.createLinearGradient(tx-bw/2,ty-fs/2,tx+bw/2,ty+fs/2);
  tg.addColorStop(0,'#e74c3c');tg.addColorStop(0.5,'#e67e22');tg.addColorStop(1,'#e74c3c');
  ctx.fillStyle=tg;ctx.fillText(_msg,tx,ty);
  // 枠線
  ctx.strokeStyle='rgba(180,0,0,0.2)';ctx.lineWidth=1;ctx.strokeText(_msg,tx,ty);

  ctx.restore();
}

// =============================================
//  FACE STATES
// =============================================
var MAX_F=4,fSt=[],bSt=[];
for(var i=0;i<MAX_F;i++){
  fSt.push({open:false,cd:0});
  bSt.push({vis:false,mx:0,my:0,af:0,msg:0});
}
var MSG_MAIN=0, MSG_ALT=1;
var BUBBLE_MSGS=["白組優勝！","盛り上がって行こー！"];

function detectMouthOpen(lm,W,H){
  var pt=function(i){return{x:(1-lm[i].x)*W,y:lm[i].y*H};};
  var le=pt(159),re=pt(386),ul=pt(13),ll=pt(14);
  var ed=Math.hypot(re.x-le.x,re.y-le.y);
  return Math.abs(ll.y-ul.y)/ed > 0.22;
}

function onResults(res){
  var W=arC.width=vid.videoWidth||window.innerWidth;
  var H=arC.height=vid.videoHeight||window.innerHeight;
  arX.clearRect(0,0,W,H);
  var det=res.multiFaceLandmarks||[];

  var anyOpen=false;

  for(var i=det.length;i<MAX_F;i++){fSt[i].open=false;fSt[i].cd=0;bSt[i].vis=false;}

  det.forEach(function(lm,fi){
    var fs=fSt[fi],bs=bSt[fi];
    var pt=function(i){return{x:(1-lm[i].x)*W,y:lm[i].y*H};};

    drawCheeks(arX,lm,W,H);
    drawNose(arX,lm,W,H);
    drawHachimaki(arX,lm,W,H);

    // 口の中心座標
    var ul=pt(13),ll=pt(14),ml=pt(61),mr=pt(291);
    var mouthCx=(ml.x+mr.x)/2;
    var mouthCy=(ul.y+ll.y)/2;

    var isOpen=detectMouthOpen(lm,W,H);
    if(isOpen) anyOpen=true;

    if(isOpen&&fs.cd<=0){
      if(!fs.open){
        fs.open=true;fs.cd=60;
        bs.vis=true;bs.mx=mouthCx;bs.my=mouthCy;bs.af=0;
        bs.msg=(Math.random()<0.1)?1:0;
        // 速度アップ！
        speedMult=3.0;
      }
    } else if(!isOpen){
      fs.open=false;
      if(fs.cd<=0) bs.vis=false;
    }
    if(fs.cd>0) fs.cd--;
    if(bs.vis){
      bs.af++;
      // 口の位置に追従
      bs.mx=mouthCx; bs.my=mouthCy;
      drawSpeechBubble(arX,bs.mx,bs.my,W,H,bs.af,bs.msg||0);
    }
  });

  if(!det.length) bSt.forEach(function(bs){bs.vis=false;});
  // 手アイコンを顔ARと同じcanvasに描画
  appareAnim++;
  drawHandIcons(arX,appareAnim);
}

// =============================================
//  CAMERA
// =============================================
var vid=document.getElementById('video');
var flashEl=document.getElementById('flash');
var toastEl=document.getElementById('toast');
var facing='user',stream=null,fmesh=null,loopId=null,proc=false;

function startAR(){document.getElementById('start-btn').style.display='none';initAudio();startCam('user');}

async function startCam(f){
  if(stream){stream.getTracks().forEach(function(t){t.stop();});stream=null;}
  if(loopId){cancelAnimationFrame(loopId);loopId=null;}
  proc=false;
  try{
    facing=f;
    var s=await navigator.mediaDevices.getUserMedia({video:{facingMode:{ideal:f},width:{ideal:1280},height:{ideal:720}}});
    stream=s;vid.srcObject=s;
    vid.style.transform=f==='user'?'scaleX(-1)':'scaleX(1)';
    vid.style.opacity='0';
    vid.style.transition='opacity 0.5s';
    document.getElementById('controls').style.display='flex';
    var cb=document.getElementById('cam-btn');
    if(cb)cb.innerHTML=f==='user'?'IN':'OUT';
    await new Promise(function(r){vid.onloadedmetadata=r;});
    await vid.play();
    setTimeout(function(){vid.style.opacity='1';},100);
    arC.width=vid.videoWidth||1280;arC.height=vid.videoHeight||720;
    if(!fmesh) await initFM(); else startLoop();
  }catch(e){showToast('Camera error');console.error(e);}
}

async function switchCamera(){showToast('\u5207\u66ff\u4e2d...');await startCam(facing==='user'?'environment':'user');}

function startLoop(){
  if(loopId){cancelAnimationFrame(loopId);loopId=null;}proc=false;
  (function lp(){
    if(fmesh&&vid.readyState>=2&&!proc){proc=true;fmesh.send({image:vid}).catch(function(){}).finally(function(){proc=false;});}
    loopId=requestAnimationFrame(lp);
  })();
}

async function initFM(){
  fmesh=new FaceMesh({locateFile:function(f){return'https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/'+f;}});
  fmesh.setOptions({maxNumFaces:MAX_F,refineLandmarks:true,minDetectionConfidence:0.5,minTrackingConfidence:0.5});
  fmesh.onResults(onResults);
  await fmesh.initialize();
  startLoop();
  // 手検出も並列で初期化
  initHands();
}

//  SCREENSHOT

  chs.forEach(function(ch,i){var c=cols[i%cols.length];sc.fillStyle=c;sc.shadowColor=c;sc.shadowBlur=8;sc.fillText(ch,tx,H-sH/2);tx+=ws[i]+gap;});
  sc.shadowBlur=0;
  var fn='kakuichi_fes_'+Date.now()+'.png';

      }

        w.document.close();
      }
      showToast('\u9577\u62bc\u3057\u3067\u4fdd\u5b58');
    },'image/png');
  } else {
    var a=document.createElement('a');
    a.download=fn;a.href=sh.toDataURL('image/png');
    document.body.appendChild(a);a.click();document.body.removeChild(a);
    showToast('\u4fdd\u5b58\u3057\u307e\u3057\u305f');

}

function showToast(msg){
  toastEl.textContent=msg;toastEl.style.display='block';
  clearTimeout(toastEl._t);
  toastEl._t=setTimeout(function(){toastEl.style.display='none';},2500);
}

// =============================================
//  HAND DETECTION - MediaPipe Hands
// =============================================
var handMesh=null;
var handLoopId=null;
var handProc=false;
var detectedHands=[]; // [{cx,cy}] 各手の手首中心

function initHands(){
  if(handMesh) return;
  handMesh=new Hands({locateFile:function(f){
    return 'https://cdn.jsdelivr.net/npm/@mediapipe/hands/'+f;
  }});
  handMesh.setOptions({
    maxNumHands:4,
    modelComplexity:0,
    minDetectionConfidence:0.6,
    minTrackingConfidence:0.5
  });
  handMesh.onResults(onHandResults);
  handMesh.initialize().then(function(){
    startHandLoop();
  });
}

function startHandLoop(){
  if(handLoopId) cancelAnimationFrame(handLoopId);
  handProc=false;
  (function lp(){
    if(handMesh&&vid.readyState>=2&&!handProc){
      handProc=true;
      handMesh.send({image:vid}).catch(function(){}).finally(function(){handProc=false;});
    }
    handLoopId=requestAnimationFrame(lp);
  })();
}

function onHandResults(res){
  var W=arC.width||window.innerWidth;
  var H=arC.height||window.innerHeight;
  detectedHands=[];
  if(!res.multiHandLandmarks) return;
  res.multiHandLandmarks.forEach(function(lm){
    // 手首(0)と中指付け根(9)の中間を中心に
    var wx=(1-lm[0].x)*W, wy=lm[0].y*H;
    var mx=(1-lm[9].x)*W, my=lm[9].y*H;
    // 手のサイズ（手首〜中指付け根の距離）
    var sz=Math.hypot(mx-wx,my-wy)*2.2;
    detectedHands.push({cx:(wx+mx)/2, cy:(wy+my)/2, sz:Math.max(60,Math.min(sz,260))});
  });
}

// =============================================
//  APPARE ICON (花まる + あっぱれ！)
// =============================================
var appareAnim=0; // グローバルアニメカウンタ（animateで加算）

function drawAppare(ctx,cx,cy,sz,frame){
  var r=sz*0.5;
  var pulse=1+Math.sin(frame*0.15)*0.06; // ぷるぷる
  var rot=Math.sin(frame*0.08)*0.12;     // ゆらゆら

  ctx.save();
  ctx.translate(cx,cy);
  ctx.rotate(rot);
  ctx.scale(pulse,pulse);

  // ---- 花まる（丸い輪郭）----
  // 外側の太い赤丸
  ctx.beginPath();
  ctx.arc(0,0,r,0,Math.PI*2);
  ctx.fillStyle='rgba(255,255,220,0.92)';
  ctx.shadowColor='rgba(255,100,0,0.4)';
  ctx.shadowBlur=16;
  ctx.fill();
  ctx.shadowBlur=0;

  // 赤い輪（二重）
  ctx.beginPath();ctx.arc(0,0,r,0,Math.PI*2);
  ctx.strokeStyle='#e74c3c';ctx.lineWidth=r*0.13;ctx.stroke();
  ctx.beginPath();ctx.arc(0,0,r*0.82,0,Math.PI*2);
  ctx.strokeStyle='#e67e22';ctx.lineWidth=r*0.07;ctx.stroke();

  // ---- 花びら装飾（8枚）----
  for(var i=0;i<8;i++){
    ctx.save();
    ctx.rotate(i*Math.PI/4+frame*0.03);
    ctx.beginPath();
    ctx.ellipse(0,-r*0.68,r*0.12,r*0.22,0,0,Math.PI*2);
    ctx.fillStyle=i%2===0?'#e74c3c':'#e67e22';
    ctx.globalAlpha=0.7;
    ctx.fill();
    ctx.restore();
  }
  ctx.globalAlpha=1;

  // ---- 「あっぱれ！」テキスト ----
  var fs=r*0.42;
  ctx.font='900 '+fs+'px sans-serif';
  ctx.textAlign='center';
  ctx.textBaseline='middle';

  // 文字影
  ctx.fillStyle='rgba(0,0,0,0.15)';
  ctx.fillText('\u3042\u3063\u3071\u308c\uff01',2,2);

  // グラデ文字
  var tg=ctx.createLinearGradient(-r*0.4,-fs/2,r*0.4,fs/2);
  tg.addColorStop(0,'#c0392b');
  tg.addColorStop(0.5,'#e67e22');
  tg.addColorStop(1,'#c0392b');
  ctx.fillStyle=tg;
  ctx.fillText('\u3042\u3063\u3071\u308c\uff01',0,0);

  // 文字輪郭
  ctx.strokeStyle='rgba(180,50,0,0.3)';
  ctx.lineWidth=1.5;
  ctx.strokeText('\u3042\u3063\u3071\u308c\uff01',0,0);

  // ---- キラキラ（外周）----
  for(var k=0;k<6;k++){
    var ka=k*Math.PI/3+frame*0.05;
    var kx=Math.cos(ka)*(r*1.18),ky=Math.sin(ka)*(r*1.18);
    var ks=r*0.08+Math.sin(frame*0.2+k)*r*0.04;
    ctx.save();
    ctx.translate(kx,ky);ctx.rotate(frame*0.1+k);
    ctx.fillStyle=['#f1c40f','#e74c3c','#e67e22'][k%3];
    ctx.beginPath();
    // 星形
    for(var p=0;p<8;p++){
      var pr=(p%2===0)?ks:ks*0.4;
      var pa=p*Math.PI/4;
      p===0?ctx.moveTo(Math.cos(pa)*pr,Math.sin(pa)*pr):ctx.lineTo(Math.cos(pa)*pr,Math.sin(pa)*pr);
    }
    ctx.closePath();ctx.fill();
    ctx.restore();
  }

  ctx.restore();
}

// animate()内で呼ぶ手アイコン描画（arCanvasへ）
function drawHandIcons(ctx,frame){
  detectedHands.forEach(function(h){
    drawAppare(ctx,h.cx,h.cy,h.sz,frame);
  });
}
